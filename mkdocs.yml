site_name: FreeSWITCH Java ESL
site_description: Comprehensive Java client library for FreeSWITCH Event Socket Layer
repo_url: https://github.com/freeswitch-java/freeswitch-java
repo_name: freeswitch-java/freeswitch-java

theme:
  name: material
  logo: https://developer.signalwire.com/freeswitch/img/logo.svg
  favicon: https://developer.signalwire.com/freeswitch/img/logo.svg
  palette:
    # Light mode (default)
    - scheme: default
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
    # Dark mode
    - scheme: slate
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - search.suggest
    - search.highlight
    - toc.integrate

markdown_extensions:
  - pymdownx.highlight:
      use_pygments: true
      pygments_lang_class: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.inlinehilite
  - pymdownx.snippets

plugins:
  - search

nav:
  - Documentation: index.md
